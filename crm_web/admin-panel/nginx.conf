limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=2r/s;

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        set $backend "web:8000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        set $backend "web:8000";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /assets/ {
        access_log off;
        try_files $uri =404;
    }

    location ~* ^/\. {
        access_log off;
        return 404;
    }

    location ~* ^/(?:\.|_)(?:env|git|ssh|docker)(?:/|$) {
        access_log off;
        return 404;
    }

    location ~* \.(?:env|pem|key|sql|yml|yaml|log|bak|old|swp|zip|tar|gz)$ {
        access_log off;
        return 404;
    }

    location ~* ^/(?:wp-config\.php|phpinfo\.php|info\.php|server-status|debug/vars|actuator)(?:/|$) {
        access_log off;
        return 404;
    }

    location ~* ^/(?:docker-compose(?:\..+)?\.(?:yml|yaml)|compose\.(?:yml|yaml))$ {
        access_log off;
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
