version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: psych_project
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build: .
    env_file: .env
    environment:
      BOT_LOCK_PATH: "${BOT_LOCK_PATH:-/tmp/renata_bot.lock}"
      PYTHONIOENCODING: "utf-8"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"

  web:
    build: .
    command: uvicorn core.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./crm_web/admin-panel
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_DEV_MOCKS: "false"
    depends_on:
      - web
    ports:
      - "80:80"

volumes:
  postgres_data:
